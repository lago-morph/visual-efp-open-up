<!DOCTYPE html>
<!--
  EPF Practices method browser — single-page viewer (MIT, © Lagomorph Labs).
  Loads data/method.json (EPF Practices 1.5.1.5 content, EPL-1.0) and renders
  an assembled, human-readable page per element from the faithfully decomposed
  base + variability-fragment nodes. Vanilla JS + D3 (CDN). No build step.
-->
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>EPF Practices — Method Browser</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root{
    --bg:#f7f7f8; --panel:#fff; --ink:#1d2330; --muted:#6b7280; --line:#e3e6eb;
    --accent:#2456b8; --accent2:#0f7b6c; --var:#d1481f; --var-bg:#fdeee7;
    --dead:#b6b9c0; --chip:#eef1f6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       color:var(--ink);background:var(--bg);display:flex;flex-direction:column}
  a{color:var(--accent);text-decoration:none}
  a:hover{text-decoration:underline}
  header{display:flex;gap:14px;align-items:center;padding:9px 16px;background:var(--panel);
         border-bottom:1px solid var(--line);flex:0 0 auto;flex-wrap:wrap}
  header h1{font-size:15px;margin:0;font-weight:700;letter-spacing:.2px;white-space:nowrap}
  header h1 small{color:var(--muted);font-weight:400}
  #search{flex:1 1 240px;min-width:160px;padding:6px 10px;border:1px solid var(--line);
          border-radius:7px;font-size:13px}
  header select{padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px;background:#fff}
  .btn{padding:6px 12px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer;font-size:13px}
  .btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  #wrap{flex:1 1 auto;display:flex;min-height:0}
  #sidebar{width:330px;flex:0 0 auto;border-right:1px solid var(--line);background:var(--panel);
           overflow:auto;padding:10px 0}
  .facet{padding:6px 14px;border-bottom:1px solid var(--line)}
  .facet h2{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:2px 0 7px}
  .cfg label{display:flex;align-items:center;gap:7px;padding:2px 0;cursor:pointer;font-size:13px}
  .cfg label .ct{margin-left:auto;color:var(--muted);font-size:12px}
  .cfg label:hover{color:var(--accent)}
  #pluginSel{width:100%}
  #cfgInfo{font-size:12px;color:var(--muted);margin-top:6px}
  #typeList{padding:4px 0}
  .tgroup>.thead{display:flex;align-items:center;gap:6px;padding:5px 14px;cursor:pointer;font-weight:600;
                 position:sticky;top:0;background:var(--panel)}
  .tgroup>.thead:hover{background:var(--chip)}
  .tgroup .dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .tgroup .ct{margin-left:auto;color:var(--muted);font-weight:400;font-size:12px}
  .tgroup .items{display:none}
  .tgroup.open .items{display:block}
  .tgroup .item{padding:3px 14px 3px 32px;cursor:pointer;font-size:13px;white-space:nowrap;
                overflow:hidden;text-overflow:ellipsis}
  .tgroup .item:hover{background:var(--chip)}
  .tgroup .item.sel{background:#e7eefb;color:var(--accent);font-weight:600}
  .tgroup .item .frag{color:var(--var);font-size:11px;margin-left:4px}
  #main{flex:1 1 auto;overflow:auto;position:relative}
  #reading{padding:20px 28px;max-width:920px}
  #graphView{display:none;position:absolute;inset:0}
  /* reading pane */
  .crumbs{font-size:12px;color:var(--muted);margin-bottom:6px}
  .asm{background:#f0f4fb;border:1px solid #d8e2f5;border-radius:8px;padding:9px 12px;margin-bottom:14px;font-size:13px}
  .asm b{color:var(--accent)}
  .asm .chip{display:inline-block;background:#fff;border:1px solid #cdd9ef;border-radius:20px;
             padding:2px 10px;margin:3px 4px 0 0;cursor:pointer;font-size:12px}
  .asm .chip:hover{border-color:var(--accent)}
  h2.title{font-size:23px;margin:2px 0 6px}
  .badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
  .badge{font-size:12px;padding:2px 9px;border-radius:20px;color:#fff;font-weight:600}
  .badge.plugin{background:var(--chip);color:var(--ink);cursor:pointer;font-weight:500}
  .lic{font-size:12px;color:var(--muted);margin:6px 0 14px}
  .varbanner{background:var(--var-bg);border:1px solid #f0c7b4;border-left:4px solid var(--var);
             border-radius:6px;padding:8px 12px;margin:10px 0;font-size:13px}
  .varbanner b{color:var(--var)}
  .body{margin:6px 0 8px}
  .body img{max-width:100%;height:auto;border:1px solid var(--line);background:#fff;padding:3px;border-radius:4px}
  .body table{border-collapse:collapse;margin:8px 0;max-width:100%}
  .body td,.body th{border:1px solid var(--line);padding:5px 8px;vertical-align:top}
  .body h3{font-size:15px;margin:16px 0 4px;padding-bottom:3px;border-bottom:1px solid var(--line)}
  .body a.dead{color:var(--dead);cursor:not-allowed;text-decoration:line-through}
  .body .field{margin:4px 0}
  .secblock{border:1px solid var(--line);border-radius:8px;margin:10px 0;overflow:hidden}
  .secblock>.sh{background:#fafbfc;padding:8px 12px;font-weight:600;border-bottom:1px solid var(--line);
                display:flex;gap:8px;align-items:center}
  .secblock>.sh .num{color:var(--muted);font-weight:700}
  .secblock>.sb{padding:8px 12px}
  .secblock.fromc>.sh{background:var(--var-bg)}
  .fromtag{font-size:11px;color:var(--var);margin-left:auto;font-weight:600}
  .addedblock{border:1px dashed var(--var);border-radius:8px;margin:12px 0;padding:0}
  .addedblock>.ah{background:var(--var-bg);color:var(--var);padding:7px 12px;font-weight:600;font-size:13px}
  .addedblock>.ab{padding:6px 12px}
  .docstruct{border:1px solid var(--line);border-radius:8px;margin:12px 0;padding:0}
  .docstruct>.dh{background:#fafbfc;padding:8px 12px;font-weight:600;border-bottom:1px solid var(--line)}
  .docstruct ul{margin:8px 0;padding-left:26px}
  .docstruct li{font-size:13px;color:#333}
  .dl{display:inline-block;margin:6px 12px;padding:5px 11px;border:1px solid var(--line);border-radius:6px;font-size:13px}
  .panels{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px}
  @media(max-width:760px){.panels{grid-template-columns:1fr}}
  .lp{border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .lp>.lph{background:#fafbfc;padding:8px 12px;font-weight:700;border-bottom:1px solid var(--line);font-size:13px}
  .lp>.lpb{padding:6px 10px}
  .reltype{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:8px 0 2px}
  .rel{padding:3px 6px;border-radius:5px;cursor:pointer}
  .rel:hover{background:var(--chip)}
  .rel.out-of-scope{opacity:.6}
  .rel .ty{font-size:11px;color:#fff;background:#9aa3b2;border-radius:4px;padding:0 5px;margin-right:6px}
  .vrel{background:var(--var-bg);border:1px solid #f0c7b4;border-radius:6px;padding:5px 8px;margin:4px 0;cursor:pointer}
  .vrel:hover{border-color:var(--var)}
  .vrel .arrow{color:var(--var);font-weight:700;margin-right:5px}
  .vrel .vt{font-weight:700;color:var(--var)}
  .empty{color:var(--muted);font-size:13px;padding:6px}
  /* graph */
  #graphView svg{width:100%;height:100%;cursor:grab}
  .glegend{position:absolute;top:10px;right:12px;background:rgba(255,255,255,.95);border:1px solid var(--line);
           border-radius:8px;padding:8px 10px;font-size:12px;max-height:80%;overflow:auto;max-width:220px}
  .glegend .lrow{display:flex;align-items:center;gap:7px;margin:2px 0}
  .glegend .sw{width:11px;height:11px;border-radius:3px}
  .gnote{position:absolute;top:10px;left:12px;background:rgba(255,255,255,.95);border:1px solid var(--line);
         border-radius:8px;padding:6px 10px;font-size:12px;color:var(--muted);max-width:60%}
  .gnode{cursor:pointer;stroke:#fff;stroke-width:1.2px}
  .gnode.sel{stroke:#111;stroke-width:2.5px}
  .glabel{font-size:9px;fill:#333;pointer-events:none}
  footer{flex:0 0 auto;border-top:1px solid var(--line);background:var(--panel);padding:8px 16px;
         font-size:12px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap}
  .spin{padding:40px;text-align:center;color:var(--muted)}
  /* plugin picker */
  #pluginPickerWrap{position:relative;display:inline-block}
  #pluginPicker{display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:300;
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    box-shadow:0 6px 28px rgba(0,0,0,.13);min-width:310px;max-height:72vh;
    overflow-y:auto;padding-bottom:6px}
  #pluginPicker.open{display:block}
  .pp-presets{display:flex;gap:5px;flex-wrap:wrap;padding:8px 12px 8px;border-bottom:1px solid var(--line)}
  .pp-pre{padding:3px 9px;border:1px solid var(--line);border-radius:5px;background:#fff;
    cursor:pointer;font-size:12px;white-space:nowrap}
  .pp-pre:hover,.pp-pre.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .pp-family{padding:7px 12px 2px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);font-weight:600}
  .pp-unit{display:flex;align-items:flex-start;gap:8px;padding:3px 12px;cursor:pointer;border-radius:5px}
  .pp-unit:hover{background:var(--chip)}
  .pp-unit input[type=checkbox]{margin-top:2px;width:14px;height:14px;cursor:pointer;flex:0 0 auto;accent-color:var(--accent)}
  .pp-unit input:disabled{cursor:default;opacity:.5}
  .pp-ulabel{font-size:13px;flex:1}
  .pp-dep{font-size:11px;color:var(--muted);display:block}
  .pp-foot{display:flex;align-items:center;gap:8px;padding:7px 12px 2px;border-top:1px solid var(--line);margin-top:4px}
  .pp-footbtn{padding:3px 9px;border:1px solid var(--line);border-radius:5px;background:#fff;cursor:pointer;font-size:12px}
  .pp-footbtn:hover{background:var(--chip)}
  .pp-count{font-size:12px;color:var(--muted);margin-left:auto}
</style>
</head>
<body>
<header>
  <h1>EPF Practices <small>· Method Browser</small></h1>
  <input id="search" type="search" placeholder="Filter elements by name…" autocomplete="off"/>
  <label style="font-size:12px;color:var(--muted)">Preset
    <select id="cfgSel"></select></label>
  <div id="pluginPickerWrap">
    <button id="pluginBtn" class="btn">Plugins ▾</button>
    <div id="pluginPicker"></div>
  </div>
  <button id="graphBtn" class="btn">Graph view</button>
</header>
<div id="wrap">
  <aside id="sidebar"><div class="spin">Loading…</div></aside>
  <div id="main">
    <div id="reading"><div class="spin">Loading method.json…</div></div>
    <div id="graphView"></div>
  </div>
</div>
<footer>
  <span><b>Viewer:</b> MIT © Lagomorph Labs (<a href="LICENSES/MIT.txt">LICENSE</a>)</span>
  <span><b>Content:</b> EPF Practices 1.5.1.5 (2012-12-12) —
        <a href="LICENSES/EPL-1.0.txt">EPL-1.0</a>, © IBM, Telelogic, Armstrong Process Group,
        Number Six Software, Xansa, Scaled Agile &amp; others (<a href="NOTICE">NOTICE</a>)</span>
  <span id="provctr"></span>
</footer>

<script>
"use strict";
const SRC_PREFIX = "source/epf_prac_1515";

// ---- type display: label, colour, group order ---------------------------
const TYPE_META = {
  Task:{l:"Tasks",c:"#2456b8",g:1}, Role:{l:"Roles",c:"#7b3fa0",g:2},
  Artifact:{l:"Work Products · Artifacts",c:"#0f7b6c",g:3},
  Deliverable:{l:"Work Products · Deliverables",c:"#0f9e88",g:3},
  Outcome:{l:"Work Products · Outcomes",c:"#13b89f",g:3},
  Guideline:{l:"Guidelines",c:"#b8860b",g:4}, Concept:{l:"Concepts",c:"#c2682a",g:5},
  Checklist:{l:"Checklists",c:"#3a7d2c",g:6}, Template:{l:"Templates",c:"#9a6a00",g:7},
  Example:{l:"Examples",c:"#8a7f1e",g:8}, Roadmap:{l:"Roadmaps",c:"#a0522d",g:9},
  SupportingMaterial:{l:"Supporting Materials",c:"#5f6b7a",g:10},
  TermDefinition:{l:"Term Definitions",c:"#8895a7",g:11},
  ToolMentor:{l:"Tool Mentors",c:"#557",g:12}, Tool:{l:"Tools",c:"#456",g:12},
  Report:{l:"Reports",c:"#789",g:12}, Practice:{l:"Practices",c:"#d1481f",g:0},
  CapabilityPattern:{l:"Capability Patterns",c:"#b5179e",g:13},
  DeliveryProcess:{l:"Delivery Processes",c:"#7209b7",g:14},
  Discipline:{l:"Disciplines",c:"#577590",g:15}, Domain:{l:"Domains",c:"#43699c",g:15},
  RoleSet:{l:"Role Sets",c:"#6a4c93",g:15}, CustomCategory:{l:"Custom Categories",c:"#9aa3b2",g:16},
  DisciplineGrouping:{l:"Discipline Groupings",c:"#577590",g:15}
};
const tmeta = t => TYPE_META[t] || {l:t,c:"#888",g:99};

// ---- plugin practice units (selectable; base+assign treated as one) --------
const PRACTICE_UNITS = [
  {id:"iterative_dev",  label:"Iterative Development",       family:"Management",
   plugins:["practice.mgmt.iterative_dev.base","practice.mgmt.iterative_dev.assign"]},
  {id:"release_planning",label:"Release Planning",           family:"Management",
   plugins:["practice.mgmt.release_planning.base","practice.mgmt.release_planning.assign"]},
  {id:"risk_value_lifecycle",label:"Risk / Value Lifecycle", family:"Management",
   plugins:["practice.mgmt.risk_value_lifecycle.base"]},
  {id:"whole_team",     label:"Whole Team",                  family:"Management",
   plugins:["practice.mgmt.whole_team.base","practice.mgmt.whole_team.assign"]},
  {id:"team_change_mgmt",label:"Team & Change Management",   family:"Management",
   plugins:["practice.mgmt.team_change_mgmt.base","practice.mgmt.team_change_mgmt.assign"]},
  {id:"project_process_tailoring",label:"Project Process Tailoring",family:"Management",
   plugins:["practice.mgmt.project_process_tailoring.base","practice.mgmt.project_process_tailoring.assign"]},
  {id:"evolutionary_arch",label:"Evolutionary Architecture", family:"Technical",
   plugins:["practice.tech.evolutionary_arch.base","practice.tech.evolutionary_arch.assign"]},
  {id:"evolutionary_design",label:"Evolutionary Design",     family:"Technical",
   plugins:["practice.tech.evolutionary_design.base","practice.tech.evolutionary_design.assign"]},
  {id:"shared_vision",  label:"Shared Vision",               family:"Technical",
   plugins:["practice.tech.shared_vision.base","practice.tech.shared_vision.assign"]},
  {id:"concurrent_testing",label:"Concurrent Testing",       family:"Technical",
   plugins:["practice.tech.concurrent_testing.base","practice.tech.concurrent_testing.assign"]},
  {id:"continuous_integration",label:"Continuous Integration",family:"Technical",
   plugins:["practice.tech.continuous_integration.base","practice.tech.continuous_integration.assign"]},
  {id:"test_driven_development",label:"Test Driven Development",family:"Technical",
   plugins:["practice.tech.test_driven_development.base","practice.tech.test_driven_development.assign"]},
  {id:"use_case_driven_dev",label:"Use Case Driven Dev",     family:"Technical",
   plugins:["practice.tech.use_case_driven_dev.base","practice.tech.use_case_driven_dev.assign"]},
  {id:"abrd",           label:"Agile Business Rules Dev",    family:"Technical",
   plugins:["practice.tech.abrd.base","practice.tech.abrd.assign"]},
  {id:"doc_trng",       label:"Documentation & Training",    family:"General",
   plugins:["practice.gen.doc_trng.base","practice.gen.doc_trng.assign"]},
  {id:"production_release",label:"Production Release",       family:"General",
   plugins:["practice.gen.production_release.base","practice.gen.production_release.assign"]},
  {id:"mdev",           label:"Mobile Development",          family:"Business",
   plugins:["practice.bus.mdev.base"]},
  {id:"openup_process", label:"OpenUP (capability patterns)",family:"Process",
   plugins:["process.openup.base","publish.openup.base"]},
  {id:"abrd_process",   label:"ABRD (capability patterns)",  family:"Process",
   plugins:["process.abrd.base","publish.abrd.base"]},
];
let dirToPU={};  // plugin dir -> practice unit id

// ---- state ---------------------------------------------------------------
let DATA, byGuid={}, outBy={}, inBy={}, configs={}, plugins={};
const state = {cfg:"", q:"", graph:false, sel:null, openTypes:new Set(),
               selectedPUs:new Set(), allSelected:true, pluginSet:null};

// ---- load ----------------------------------------------------------------
fetch("data/method.json").then(r=>r.json()).then(d=>{
  DATA=d;
  d.nodes.forEach(n=>byGuid[n.guid]=n);
  d.edges.forEach(e=>{
    (outBy[e.from_guid]=outBy[e.from_guid]||[]).push(e);
    (inBy[e.to_guid]=inBy[e.to_guid]||[]).push(e);
  });
  d.plugins.forEach(p=>plugins[p.dir]=p);
  d.configs=d.configurations; d.configurations.forEach(c=>configs[c.guid]=c);
  initPracticeUnits();
  readPluginState();
  initControls();
  window.addEventListener("hashchange",onHash);
  onHash();
  renderSidebar();
}).catch(e=>{
  document.getElementById("reading").innerHTML =
    '<p class="empty">Failed to load <code>data/method.json</code>: '+esc(String(e))+'</p>';
});

// ---- helpers -------------------------------------------------------------
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));}
function nameOf(g){const n=byGuid[g];return n?(n.presentation_name||n.name||g):null;}
function curGuid(){return decodeURIComponent((location.hash||"").replace(/^#/,""));}

function visible(n){
  if(!state.allSelected && state.pluginSet && !state.pluginSet.has(n.plugin)) return false;
  if(state.q){
    const q=state.q.toLowerCase();
    if(!((n.presentation_name||"").toLowerCase().includes(q) ||
         (n.name||"").toLowerCase().includes(q))) return false;
  }
  return true;
}

// ---- controls ------------------------------------------------------------
function initControls(){
  const cs=document.getElementById("cfgSel");
  cs.innerHTML='<option value="">All content</option>'+
    DATA.configurations.map(c=>`<option value="${c.guid}">${esc(c.presentation_name)}</option>`).join("");
  cs.onchange=()=>{
    state.cfg=cs.value;
    if(!state.cfg){
      state.allSelected=true; state.selectedPUs=new Set();
    } else {
      const cfg=configs[state.cfg];
      state.allSelected=false;
      state.selectedPUs=puIdsForConfig(cfg);
    }
    computePluginSet(); renderSidebar(); renderPluginPicker(); updatePluginBtn();
    savePluginState(); if(state.graph)drawGraph();
  };

  document.getElementById("pluginBtn").onclick=e=>{
    e.stopPropagation(); togglePluginPicker();
  };
  document.addEventListener("click",e=>{
    if(!document.getElementById("pluginPickerWrap").contains(e.target)) closePluginPicker();
  });

  document.getElementById("search").oninput=e=>{state.q=e.target.value.trim();renderSidebar();};
  document.getElementById("graphBtn").onclick=toggleGraph;

  const c=DATA.meta.counts;
  document.getElementById("provctr").innerHTML =
    `${c.nodes} elements · ${c.edges} links · ${c.variability_edges} variability · ${c.plugins} plugins`;

  renderPluginPicker();
  updatePluginBtn();
}
function updateCfgInfo(){
  const el=document.getElementById("cfgInfo"); if(!el) return;
  if(state.allSelected){el.textContent="Showing all "+DATA.nodes.length+" elements."; return;}
  const vis=DATA.nodes.filter(visible).length;
  if(state.cfg && configs[state.cfg]){
    const c=configs[state.cfg];
    el.innerHTML=`<b>${esc(c.presentation_name)}</b>: ${vis} elements shown.`;
  } else {
    el.textContent=`Custom selection: ${vis} elements shown.`;
  }
}

// ---- practice unit dependency logic ----------------------------------------
function initPracticeUnits(){
  const dirByGuid={};
  DATA.plugins.forEach(p=>{ if(p.guid) dirByGuid[p.guid]=p.dir; });
  PRACTICE_UNITS.forEach(pu=>pu.plugins.forEach(d=>dirToPU[d]=pu.id));
  const puById={}; PRACTICE_UNITS.forEach(pu=>puById[pu.id]=pu);
  PRACTICE_UNITS.forEach(pu=>{
    const depIds=new Set();
    pu.plugins.forEach(dir=>{
      const plug=plugins[dir]; if(!plug||!plug.bases) return;
      plug.bases.forEach(bg=>{
        const bd=dirByGuid[bg]; if(!bd) return;
        const depId=dirToPU[bd]; if(depId&&depId!==pu.id) depIds.add(depId);
      });
    });
    pu.deps=[...depIds];
  });
  // build reverse deps
  const rdeps={};
  PRACTICE_UNITS.forEach(pu=>pu.deps.forEach(d=>(rdeps[d]=rdeps[d]||[]).push(pu.id)));
  PRACTICE_UNITS.forEach(pu=>pu.rdeps=rdeps[pu.id]||[]);
}

function expandDeps(ids){
  const result=new Set(ids);
  let changed=true;
  while(changed){
    changed=false;
    PRACTICE_UNITS.forEach(pu=>{
      if(result.has(pu.id)) pu.deps.forEach(d=>{ if(!result.has(d)){result.add(d);changed=true;} });
    });
  }
  return result;
}

function computePluginSet(){
  if(state.allSelected){state.pluginSet=null;return;}
  const effective=expandDeps(state.selectedPUs);
  if(!effective.size){state.pluginSet=new Set();return;} // nothing selected → show nothing
  const dirs=new Set();
  PRACTICE_UNITS.forEach(pu=>{ if(effective.has(pu.id)) pu.plugins.forEach(d=>dirs.add(d)); });
  // core.* plugins are shared infrastructure (slots, roles, UMA concepts,
  // categories) that practices reference — include whenever any practice is active.
  DATA.plugins.forEach(p=>{ if(p.dir.startsWith("core.")) dirs.add(p.dir); });
  state.pluginSet=dirs;
}

function puIdsForConfig(cfg){
  const cfgDirs=new Set(cfg.plugins);
  const ids=new Set();
  PRACTICE_UNITS.forEach(pu=>{
    const existing=pu.plugins.filter(d=>plugins[d]);
    if(existing.length&&existing.every(d=>cfgDirs.has(d))) ids.add(pu.id);
  });
  return ids;
}

function readPluginState(){
  const ps=new URLSearchParams(location.search).get("plugins");
  if(ps){
    const ids=ps.split(",").filter(id=>PRACTICE_UNITS.find(pu=>pu.id===id));
    if(ids.length){
      state.allSelected=false;
      state.selectedPUs=new Set(ids);
      computePluginSet();
    }
  }
}

function savePluginState(){
  const params=new URLSearchParams(location.search);
  if(state.allSelected||state.selectedPUs.size===0) params.delete("plugins");
  else params.set("plugins",[...state.selectedPUs].join(","));
  const qs=params.toString();
  history.replaceState(null,"",""+(qs?"?"+qs:"")+location.hash);
}

function updatePluginBtn(){
  const btn=document.getElementById("pluginBtn");
  if(state.allSelected){
    btn.textContent="Plugins: All ▾"; btn.classList.remove("active");
  } else {
    const eff=expandDeps(state.selectedPUs).size;
    btn.textContent=`Plugins: ${eff}/${PRACTICE_UNITS.length} ▾`;
    btn.classList.toggle("active", eff < PRACTICE_UNITS.length);
  }
}

function togglePluginPicker(){
  const p=document.getElementById("pluginPicker");
  if(p.classList.contains("open")) p.classList.remove("open");
  else { renderPluginPicker(); p.classList.add("open"); }
}
function closePluginPicker(){ document.getElementById("pluginPicker").classList.remove("open"); }

function renderPluginPicker(){
  const effective=state.allSelected?new Set(PRACTICE_UNITS.map(p=>p.id)):expandDeps(state.selectedPUs);
  // Which PUs are auto-required (in effective but not in selectedPUs)?
  const autoReqBy={}; // puId -> [requiringId,...]
  if(!state.allSelected){
    PRACTICE_UNITS.forEach(pu=>{
      if(effective.has(pu.id)&&!state.selectedPUs.has(pu.id)){
        pu.deps.forEach(()=>{}); // already in effective through someone
        // find who requires this
        const req=pu.rdeps.filter(r=>effective.has(r));
        autoReqBy[pu.id]=req;
      }
    });
  }

  // preset buttons
  const presetMap={};
  DATA.configurations.forEach(c=>{
    const ids=puIdsForConfig(c); presetMap[c.guid]=ids;
  });
  function isPresetActive(cfgGuid){
    if(state.allSelected) return false;
    const pids=presetMap[cfgGuid];
    if(!pids||pids.size!==state.selectedPUs.size) return false;
    return [...pids].every(id=>state.selectedPUs.has(id));
  }

  let h=`<div class="pp-presets">`;
  h+=`<button class="pp-pre${state.allSelected?" active":""}" data-preset="all">All EPF</button>`;
  DATA.configurations.forEach(c=>{
    h+=`<button class="pp-pre${isPresetActive(c.guid)?" active":""}" data-preset="${esc(c.guid)}">${esc(c.presentation_name)}</button>`;
  });
  h+=`</div>`;

  // grouped checkboxes
  const families=[...new Set(PRACTICE_UNITS.map(pu=>pu.family))];
  families.forEach(fam=>{
    h+=`<div class="pp-family">${esc(fam)}</div>`;
    PRACTICE_UNITS.filter(pu=>pu.family===fam).forEach(pu=>{
      const isEff=state.allSelected||effective.has(pu.id);
      const isAuto=!state.allSelected&&isEff&&!state.selectedPUs.has(pu.id);
      const reqBy=autoReqBy[pu.id]||[];
      const depLabel=isAuto&&reqBy.length
        ? `<span class="pp-dep">required by: ${reqBy.map(r=>{const p=PRACTICE_UNITS.find(x=>x.id===r);return p?p.label:r;}).join(", ")}</span>`
        : (!state.allSelected&&isEff&&pu.deps.length&&state.selectedPUs.has(pu.id)&&pu.deps.some(d=>effective.has(d)&&!state.selectedPUs.has(d)))
          ? `<span class="pp-dep">auto-selects: ${pu.deps.filter(d=>effective.has(d)&&!state.selectedPUs.has(d)).map(d=>{const p=PRACTICE_UNITS.find(x=>x.id===d);return p?p.label:d;}).join(", ")}</span>`
          : "";
      h+=`<label class="pp-unit">
        <input type="checkbox" data-puid="${esc(pu.id)}" ${isEff?"checked":""}
          ${isAuto?"disabled title=\"Uncheck the requiring practice to remove this\"":""}>
        <span class="pp-ulabel">${esc(pu.label)}${depLabel}</span>
      </label>`;
    });
  });

  h+=`<div class="pp-foot">
    <button class="pp-footbtn" id="ppSelAll">Select all</button>
    <button class="pp-footbtn" id="ppClear">Clear all</button>
    <span class="pp-count">${effective.size}/${PRACTICE_UNITS.length} practices</span>
  </div>`;

  const panel=document.getElementById("pluginPicker");
  panel.innerHTML=h;

  panel.querySelectorAll("[data-preset]").forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();
      const pid=btn.dataset.preset;
      if(pid==="all"){
        state.allSelected=true; state.selectedPUs=new Set(); state.cfg="";
        document.getElementById("cfgSel").value="";
      } else {
        const cfg=configs[pid];
        state.allSelected=false; state.selectedPUs=puIdsForConfig(cfg); state.cfg=pid;
        document.getElementById("cfgSel").value=pid;
      }
      computePluginSet(); renderSidebar(); renderPluginPicker(); updatePluginBtn(); savePluginState();
      if(state.graph)drawGraph();
    };
  });

  panel.querySelectorAll("input[data-puid]").forEach(cb=>{
    cb.onchange=e=>{
      e.stopPropagation();
      const id=cb.dataset.puid;
      if(cb.checked) state.selectedPUs.add(id);
      else {
        // cascade: remove this id and any that depend ONLY on it (transitively)
        state.selectedPUs.delete(id);
        // remove selectedPUs whose effective set would still be covered — just let expandDeps handle it
        // Also remove selectedPUs that depend on this (no longer satisfied)
        const stillEff=expandDeps(state.selectedPUs);
        // Remove from selectedPUs anything that is no longer in effective (shouldn't happen, but clean up)
        [...state.selectedPUs].forEach(sid=>{if(!stillEff.has(sid))state.selectedPUs.delete(sid);});
      }
      if(state.selectedPUs.size===0) state.allSelected=true;
      else state.allSelected=false;
      state.cfg=""; document.getElementById("cfgSel").value="";
      computePluginSet(); renderSidebar(); renderPluginPicker(); updatePluginBtn(); savePluginState();
      if(state.graph)drawGraph();
    };
  });

  document.getElementById("ppSelAll").onclick=e=>{
    e.stopPropagation();
    state.allSelected=true; state.selectedPUs=new Set(); state.cfg="";
    document.getElementById("cfgSel").value="";
    computePluginSet(); renderSidebar(); renderPluginPicker(); updatePluginBtn(); savePluginState();
    if(state.graph)drawGraph();
  };
  document.getElementById("ppClear").onclick=e=>{
    e.stopPropagation();
    state.allSelected=false; state.selectedPUs=new Set(); state.cfg="";
    document.getElementById("cfgSel").value="";
    computePluginSet(); renderSidebar(); renderPluginPicker(); updatePluginBtn(); savePluginState();
    if(state.graph)drawGraph();
  };
}

// ---- sanitize + rewrite body HTML ---------------------------------------
const OK_TAGS=new Set(["a","p","br","ul","ol","li","b","i","em","strong","u","s","sup","sub",
  "h1","h2","h3","h4","h5","h6","table","thead","tbody","tfoot","tr","td","th","caption","col","colgroup",
  "img","span","div","pre","code","blockquote","hr","dl","dt","dd","section","figure","figcaption","center"]);
const OK_ATTR=new Set(["href","src","alt","title","class","colspan","rowspan","width","height","align","valign","guid","target","scope"]);

function sanitize(rawHtml, sourcePath){
  const tpl=document.createElement("template");
  tpl.innerHTML=rawHtml||"";
  const baseDir = sourcePath? sourcePath.slice(0,sourcePath.lastIndexOf("/")) : SRC_PREFIX;
  const walk=el=>{
    [...el.children].forEach(ch=>{
      const tag=ch.tagName.toLowerCase();
      if(!OK_TAGS.has(tag)){ // unwrap unknown tag, keep children/text
        const f=document.createDocumentFragment();
        while(ch.firstChild) f.appendChild(ch.firstChild);
        ch.replaceWith(f); walk(el); return;
      }
      [...ch.attributes].forEach(a=>{
        const an=a.name.toLowerCase();
        if(!OK_ATTR.has(an) || an.startsWith("on") || /javascript:/i.test(a.value)) ch.removeAttribute(a.name);
      });
      if(tag==="a"){
        const g=ch.getAttribute("guid");
        if(g){ ch.removeAttribute("guid");
          if(byGuid[g]){ ch.setAttribute("href","#"+encodeURIComponent(g)); ch.classList.remove("dead"); }
          else { ch.removeAttribute("href"); ch.classList.add("dead"); ch.title="target not in library"; }
        } else {
          const h=ch.getAttribute("href")||"";
          if(/^https?:/i.test(h)) ch.setAttribute("target","_blank");
          else if(h && !h.startsWith("#")){ ch.classList.add("dead"); ch.removeAttribute("href"); }
        }
      }
      if(tag==="img"){
        const s=ch.getAttribute("src")||"";
        if(s && !/^https?:|^data:/i.test(s)) ch.setAttribute("src", resolveRel(s, baseDir));
        ch.setAttribute("loading","lazy");
      }
      walk(ch);
    });
  };
  walk(tpl.content);
  return tpl.content;
}
function resolveRel(rel, baseDir){
  try{ const u=new URL(rel, "http://x/"+baseDir+"/"); return u.pathname.replace(/^\//,""); }
  catch(e){ return baseDir+"/"+rel; }
}

// ---- assemble (render-time variability merge) ----------------------------
function assemble(node){
  const inV=(inBy[node.guid]||[]).filter(e=>e.variability);
  const contributors=inV.filter(e=>e.type==="contributes"||e.type==="extends")
                        .map(e=>byGuid[e.from_guid]).filter(Boolean);
  const replacers=inV.filter(e=>e.type==="replaces").map(e=>byGuid[e.from_guid]).filter(Boolean);
  // steps: base then contributors'
  const sections=node.sections.map(s=>({...s,from:null}));
  contributors.forEach(c=>c.sections.forEach(s=>sections.push({...s,from:c})));
  // body blocks
  const bodyBlocks=[{html:node.body_html,from:null}];
  contributors.forEach(c=>{ if(c.body_html&&c.body_html.trim()) bodyBlocks.push({html:c.body_html,from:c}); });
  // outbound refs union (non-variability)
  const refs=new Map();
  const addRefs=(g,owner)=> (outBy[g]||[]).filter(e=>!e.variability).forEach(e=>{
    refs.set(e.type+"|"+e.to_guid,{type:e.type,to:e.to_guid,owner});
  });
  addRefs(node.guid,null); contributors.forEach(c=>addRefs(c.guid,c));
  return {contributors,replacers,sections,bodyBlocks,outRefs:[...refs.values()]};
}

function docStructEl(n){

         `${esc(a.ext.toUpperCase())} file (old binary format). Use the download link below.</div>`;
    }
    h+=`<a class="dl" href="${esc(a.path)}" download>⬇ Download ${esc(a.filename)} (${esc(a.ext)})</a></div>`;
  });
  wrap.innerHTML=h; return wrap;
}

function linksPanelHTML(n,A){
  // outbound
  const outV=(outBy[n.guid]||[]).filter(e=>e.variability);
  const inAll=(inBy[n.guid]||[]);
  const inV=inAll.filter(e=>e.variability);
  const inRefs=inAll.filter(e=>!e.variability);
  // group helper
  const grp=(arr,keyTo)=>{const g={};arr.forEach(e=>{(g[e.type]=g[e.type]||[]).push(keyTo?e.from_guid:e.to_guid);});return g;};
  const inScope=gid=>{
    if(!state.pluginSet) return true;
    const nd=byGuid[gid]; return nd?state.pluginSet.has(nd.plugin):false;
  };
  const renderRefs=(g,inbound=false)=>{
    const ks=Object.keys(g).sort(); if(!ks.length) return '<div class="empty">none</div>';
    const labelFn=inbound?prettyRelInbound:prettyRel;
    return ks.map(t=>`<div class="reltype">${esc(labelFn(t))}</div>`+
      g[t].map(gid=>{
        const nd=byGuid[gid];
        if(!nd) return `<div class="rel" style="cursor:default"><span class="ty">?</span><span style="color:var(--dead)">unresolved (${esc(gid).slice(0,10)}…)</span></div>`;
        const out=!inScope(gid);
        return `<div class="rel${out?' out-of-scope':''}" ${out?'':''}data-g="${esc(gid)}" title="${out?'Outside current plugin selection — click to view anyway':''}">
          <span class="ty" style="${out?'opacity:.5':''}background:${tmeta(nd.type).c};color:#fff">${esc(shortType(nd.type))}</span>${out?`<span style="color:var(--muted)">`:``}${esc(nameOf(gid))}${out?`</span><span style="font-size:10px;color:var(--muted);margin-left:4px">(${esc(nd.plugin)})</span>`:''}
        </div>`;
      }).join("")).join("");
  };
  // variability section (prominent)
  let vhtml="";
  outV.forEach(e=>vhtml+=vrel("↳",e.type,"to",e.to_guid));
  inV.forEach(e=>vhtml+=vrel("↰",e.type,"from",e.from_guid));
  if(!vhtml) vhtml='<div class="empty">No variability relationships.</div>';

  // outbound union (assembled) minus variability
  const outG={}; A.outRefs.forEach(r=>{(outG[r.type]=outG[r.type]||[]).push(r.to);});

  return `<div class="lp"><div class="lph">⚡ Variability</div><div class="lpb">${vhtml}</div></div>`+
         `<div class="lp"><div class="lph">→ Outbound references${A.contributors.length?' (assembled)':''}</div><div class="lpb">${renderRefs(outG)}</div></div>`+
         `<div class="lp"><div class="lph">← Inbound references</div><div class="lpb">${renderRefs(grp(inRefs,true),true)}</div></div>`;
}
function vrel(arrow,type,dir,gid){
  const known=byGuid[gid];
  const label= dir==="to" ? `${type} ` : `${invRel(type)} `;
  return `<div class="vrel" ${known?`data-g="${esc(gid)}"`:''}>
    <span class="arrow">${arrow}</span><span class="vt">${esc(label)}</span>
    «${known?esc(nameOf(gid)):"unresolved"}»${known?` <span style="color:var(--muted)">(${esc(known.plugin)})</span>`:""}</div>`;
}
function invRel(t){return {contributes:"contributed to by",extends:"extended by",replaces:"replaced by"}[t]||(t+" by");}
function prettyRel(t){return t.replace(/_/g," ").replace(/([a-z])([A-Z])/g,"$1 $2").toLowerCase();}
// Label for an edge type when viewed from the TARGET end (inbound reference)
function prettyRelInbound(t){
  const m={
    mandatoryInput:"mandatory input of",
    optionalInput:"optional input of",
    output:"produced by",
    performedBy:"primary performer of",
    additionallyPerformedBy:"additional performer of",
    responsibleFor:"responsibility of",
    fulfills:"fulfilled by",
    guidelines:"guideline for",
    checklists:"checklist for",
    examples:"example for",
    templates:"template for",
    toolMentors:"tool mentor for",
    reports:"report for",
    supportingMaterials:"supporting material for",
    categorizedElements:"categorized in",
    conceptsAndPapers:"concept/paper for",
    tasks:"task in",
    workProducts:"work product in",
    roles:"role in",
    contentReferences:"referenced by",
    activityReferences:"activity reference for",
  };
  return m[t]||("← "+prettyRel(t));
}
function shortType(t){return (tmeta(t).l||t).split(" ")[0];}

      <b>${c.configurations}</b> configurations.</p>
   <div class="asm">Pick an element on the left, choose a <b>configuration</b> (e.g. OpenUP) or a
     <b>plugin</b> to scope the library, type to filter, or open the <b>Graph view</b>.
     Every link below is shareable via <code>#guid</code>.</div>
   <div class="panels">
     <div class="lp"><div class="lph">Published elements by type</div><div class="lpb">${
       top.map(([t,k])=>`<div class="rel" onclick="document.querySelector('.tgroup[data-t=&quot;${esc(t)}&quot;] .thead')?.click()">
         <span class="ty" style="background:${tmeta(t).c}">${k}</span>${esc(tmeta(t).l)}</div>`).join("")}</div></div>
     <div class="lp"><div class="lph">Licensing</div><div class="lpb" style="font-size:13px">
       <p><b>Viewer code:</b> MIT © Lagomorph Labs.</p>
       <p><b>Imported content:</b> EPL-1.0. Every content node is tagged
          <code>license: "EPL-1.0"</code>. © IBM, Telelogic, Armstrong Process Group,
          Number Six Software, Xansa, Scaled Agile and others.</p>
       <p><a href="LICENSES/EPL-1.0.txt">EPL-1.0</a> · <a href="LICENSES/MIT.txt">MIT</a> · <a href="NOTICE">NOTICE</a></p>
     </div></div>
   </div>`;
}

// ---- graph view ----------------------------------------------------------
function toggleGraph(){ state.graph=!state.graph; applyView(); if(state.graph)drawGraph(); }
function applyView(){
  document.getElementById("graphView").style.display=state.graph?"block":"none";
  document.getElementById("reading").style.display=state.graph?"none":"block";
  document.getElementById("graphBtn").classList.toggle("active",state.graph);
  document.getElementById("graphBtn").textContent=state.graph?"Reading view":"Graph view";
}
let gsim;
function graphNodes(){
  let ns=DATA.nodes.filter(visible);
  let note="";
  const CAP=700;
  if(ns.length>CAP){
    // too dense → show neighbourhood of selection, else a capped sample
    if(state.sel && byGuid[state.sel]){
      const keep=new Set([state.sel]);
      (outBy[state.sel]||[]).forEach(e=>keep.add(e.to_guid));
      (inBy[state.sel]||[]).forEach(e=>keep.add(e.from_guid));
      ns=DATA.nodes.filter(n=>keep.has(n.guid));
      note=`Filtered set is large (${DATA.nodes.filter(visible).length}). Showing the neighbourhood of “${esc(nameOf(state.sel))}”. Narrow with the Plugins picker, or click nodes to walk the graph.`;
    } else {
      note=`Filtered set is large (${ns.length} nodes). Showing a sample of ${CAP} — use the Plugins picker to narrow, or select an element to focus its neighbourhood.`;
      ns=ns.slice(0,CAP);
    }
  }
  return {ns,note};
}
function drawGraph(){
  const host=d3.select("#graphView"); host.selectAll("*").remove();
  const {ns,note}=graphNodes();
  const ids=new Set(ns.map(n=>n.guid));
  const links=DATA.edges.filter(e=>ids.has(e.from_guid)&&ids.has(e.to_guid))
    .map(e=>({source:e.from_guid,target:e.to_guid,variability:e.variability,type:e.type}));
  const W=host.node().clientWidth||800, H=host.node().clientHeight||600;
  const svg=host.append("svg").attr("viewBox",[0,0,W,H]);
  const root=svg.append("g");
  svg.call(d3.zoom().scaleExtent([0.15,4]).on("zoom",ev=>root.attr("transform",ev.transform)));
  const nodes=ns.map(n=>({id:n.guid,t:n.type,name:n.presentation_name||n.name}));
  gsim=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(60).strength(.3))
    .force("charge",d3.forceManyBody().strength(-120))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collide",d3.forceCollide(12));
  const link=root.append("g").selectAll("line").data(links).join("line")
    .attr("stroke",d=>d.variability?"var(--var)":"#cdd2da")
    .attr("stroke-width",d=>d.variability?2:1)
    .attr("stroke-dasharray",d=>d.variability?"4 3":null)
    .attr("opacity",d=>d.variability?.95:.5);
  const node=root.append("g").selectAll("circle").data(nodes).join("circle")
    .attr("class","gnode").attr("r",d=>d.id===state.sel?9:6)
    .attr("fill",d=>tmeta(d.t).c)
    .classed("sel",d=>d.id===state.sel)
    .on("click",(e,d)=>go(d.id))
    .call(d3.drag()
      .on("start",(e,d)=>{if(!e.active)gsim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
      .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
      .on("end",(e,d)=>{if(!e.active)gsim.alphaTarget(0);d.fx=null;d.fy=null;}));
  node.append("title").text(d=>d.name+" — "+d.t);
  const label=root.append("g").selectAll("text").data(nodes.length<=120?nodes:[]).join("text")
    .attr("class","glabel").attr("dx",8).attr("dy",3).text(d=>d.name);
  gsim.on("tick",()=>{
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("cx",d=>d.x).attr("cy",d=>d.y);
    label.attr("x",d=>d.x).attr("y",d=>d.y);
  });
  // legend + note
  const types=[...new Set(nodes.map(n=>n.t))].sort((a,b)=>tmeta(a).g-tmeta(b).g);
  let leg=`<div class="lrow"><span style="font-weight:700">${nodes.length} nodes · ${links.length} links</span></div>
    <div class="lrow"><span class="sw" style="background:var(--var);border-radius:0;height:3px"></span>variability edge</div>
    <div class="lrow"><span class="sw" style="background:#cdd2da;border-radius:0;height:2px"></span>reference edge</div><hr/>`;
  leg+=types.map(t=>`<div class="lrow"><span class="sw" style="background:${tmeta(t).c}"></span>${esc(tmeta(t).l)}</div>`).join("");
  host.append("xhtml:div").attr("class","glegend").html(leg);
  if(note) host.append("xhtml:div").attr("class","gnote").html(note);
}
function highlightGraph(){ if(state.graph) drawGraph(); }
applyView();
</script>
